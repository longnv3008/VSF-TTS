# pytest configuration for the VAD generic test suite
[pytest]
# Discover tests in the tests/ directory
testpaths = tests

# Show short test IDs, verbose output on failure
addopts = -q --tb=short

# Custom markers
markers =
    integration: Tests that require the ONNX model file (VAD/models/vad/1/vad.onnx)
    slow: Tests that are computationally expensive

# Minimum pytest version
minversion = 7.0
